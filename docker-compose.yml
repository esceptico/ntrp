services:
  ntrp-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ntrp-backend
    restart: unless-stopped
    ports:
      - "${NTRP_PORT:-6877}:6877"
    volumes:
      - ntrp-data:/home/ntrp/.ntrp
    env_file: .env
    environment:
      # browser history doesn't work in docker
      - NTRP_BROWSER=
    networks:
      - ntrp-network

volumes:
  ntrp-data:
    driver: local

networks:
  ntrp-network:
    driver: bridge
