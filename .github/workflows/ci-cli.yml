name: CI Clients

on:
  push:
    branches: [main]
    paths:
      - "apps/tui/**"
      - "apps/desktop/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/tui/**"
      - "apps/desktop/**"

jobs:
  tui-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: apps/tui/package.json

      - name: Install dependencies
        working-directory: apps/tui
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: apps/tui
        run: bun run build

  desktop-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: apps/desktop/package.json

      - name: Install dependencies
        working-directory: apps/desktop
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: apps/desktop
        run: bun run typecheck

      - name: Build
        working-directory: apps/desktop
        run: bun run build
